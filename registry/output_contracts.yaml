schema_version: 1
updated_at: "2026-04-17"
contracts:
  variant-effect:
    assumptions:
      - coordinate-convention-must-be-explicit
      - ref-alt-interpretation-limited-to-selected-model
      - explicit-compare-intent-required-for-multi-skill-composition
      - vcf-batch-manifest-normalizes-to-snp-records-with-status-tracking
      - unified-output-defaults-to-wide-table-plus-per-skill-standardized-records
      - evo2-prefers-large-window-then-adaptive-window-fallback
    runnable_steps:
      - bash scripts/run_agent.sh --task variant-effect --query {selected_skill}-variant-effect-workflow
      - awk 'NR<=120{print}' playbooks/variant-effect/README.md
      - "# Single-skill execution keeps primary skill behavior unless explicit comparison intent is present."
      - "# Explicit multi-skill: bash case-study-playbooks/variant-effect/run_variant_effect_case.sh --vcf <file.vcf> --run-id <YYYYMMDDTHHMMSSZ> --skills alphagenome,borzoi,evo2,gpn --assembly hg38 --continue-on-error 1"
    expected_outputs:
      - plan-json:variant-effect
      - expected-file:case-study-playbooks/variant-effect/<run_id>/variant_effect_case_summary.json
      - expected-file:case-study-playbooks/variant-effect/<run_id>/logs/variant_effect_case_manifest.tsv
      - expected-file:case-study-playbooks/variant-effect/<run_id>/logs/unified_variant_effect_records.tsv
      - expected-file:case-study-playbooks/variant-effect/<run_id>/logs/unified_variant_effect_records.json
      - expected-file:case-study-playbooks/variant-effect/<run_id>/alphagenome_results/alphagenome_variant_effect_records.tsv
      - expected-file:case-study-playbooks/variant-effect/<run_id>/borzoi_results/borzoi_variant_effect_records.tsv
      - expected-file:case-study-playbooks/variant-effect/<run_id>/evo2_results/evo2_variant_effect_records.tsv
      - expected-file:case-study-playbooks/variant-effect/<run_id>/gpn_results/gpn_variant_effect_records.tsv
    output_columns:
      base: [vid, chrom, position, ref, alt, variant_type, assembly, interval_start, interval_end]
      info_passthrough: all VCF INFO keys (dynamic, sorted alphabetically)
      per_tissue: ["{tissue}_mean_diff", "{tissue}_log2fc"] for each of 8 tissues
      metadata: [status, error, run_time_utc]
    tissues:
      Neuronal_stem_cell: CL:0000047
      Skeletal_Muscle: UBERON:0011907
      Whole_Blood: UBERON:0013756
      Endothelial_cell: CL:0000115
      Lung: UBERON:0002048
      Liver: UBERON:0002107
      Visceral_Adipose: UBERON:0010414
      Skin: UBERON:0036149
    fallbacks:
      - ask-for-missing-variant-spec
      - fallback-to-single-primary-skill-when-no-explicit-compare-intent
      - retry-with-network-proxy-once-if-hosted-api-times-out
    retry_policy: adaptive-window-fallback-with-timeout-proxy-retry
  embedding:
    assumptions:
      - sequence-length-and-tokenization-must-match-model
      - embedding-granularity-must-be-explicit
    runnable_steps:
      - bash case-study-playbooks/embedding/run_embedding_case.sh --bed case-study-playbooks/embedding/bed/Test.interval.bed --run-id $(date -u +%Y%m%dT%H%M%SZ) --skills all --continue-on-error 1
      - awk 'NR<=160{print}' playbooks/embedding/README.md
    expected_outputs:
      - plan-json:embedding
      - expected-file:case-study-playbooks/embedding/<run_id>/embedding_case_summary.json
      - expected-file:case-study-playbooks/embedding/<run_id>/logs/embedding_case_manifest.tsv
      - expected-file:case-study-playbooks/embedding/<run_id>/logs/embedding_intervals_manifest.tsv
      - expected-file:case-study-playbooks/embedding/<run_id>/logs/history_archive_manifest.tsv
      - expected-file:case-study-playbooks/embedding/<run_id>/dnabert2_results/interval_*/case_metadata.json
      - expected-file:case-study-playbooks/embedding/<run_id>/dnabert2_results/interval_*/*_result.json
      - expected-file:case-study-playbooks/embedding/<run_id>/evo2_results/interval_*/evo2_real_workflow_results.json
      - expected-file:case-study-playbooks/embedding/<run_id>/evo2_results/interval_*/case_metadata.json
      - expected-file:case-study-playbooks/embedding/<run_id>/ntv3_results/interval_*/*_result.json
      - expected-plot:case-study-playbooks/embedding/<run_id>/ntv3_results/interval_*/*_trackplot.png
    fallbacks:
      - switch-to-compatible-embedding-skill
    retry_policy: clarify-then-single-retry
  fine-tuning:
    assumptions:
      - dataset-schema-must-be-validated-before-training
      - evaluation-artifacts-path-must-be-defined
    runnable_steps:
      - bash scripts/run_agent.sh --task fine-tuning --query {selected_skill}-fine-tuning-workflow
      - awk 'NR<=120{print}' playbooks/fine-tuning/README.md
    expected_outputs:
      - plan-json:fine-tuning
      - expected-file:train-command.sh
      - expected-file:eval-metrics.json
    fallbacks:
      - reduce-scope-to-minimal-train-run
    retry_policy: clarify-then-single-retry
  track-prediction:
    assumptions:
      - species-and-assembly-must-be-provided
      - bed-batch-summary-is-source-of-truth-for-partial-failures
      - per-interval-artifacts-must-land-under-track-run-root
    runnable_steps:
      - bash scripts/run_agent.sh --task track-prediction --query {selected_skill}-track-prediction-workflow
      - awk 'NR<=120{print}' playbooks/track-prediction/README.md
    expected_outputs:
      - plan-json:track-prediction
      - expected-file:case-study-playbooks/track_prediction/<run_id>/alphagenome_results/alphagenome_track_bed_batch_summary.json
      - expected-file:case-study-playbooks/track_prediction/<run_id>/ntv3_results/ntv3_bed_batch_summary.json
      - expected-file:case-study-playbooks/track_prediction/<run_id>/borzoi_results/borzoi_bed_batch_summary.json
      - expected-file:case-study-playbooks/track_prediction/<run_id>/segmentnt_results/segmentnt_bed_batch_summary.json
      - expected-plot:case-study-playbooks/track_prediction/<run_id>/*_results/*_trackplot.png
      - expected-file:case-study-playbooks/track_prediction/<run_id>/*_results/*_result.json
      - expected-file:case-study-playbooks/track_prediction/<run_id>/*_results/*.log
    fallbacks:
      - fallback-to-secondary-track-skill
    retry_policy: clarify-interval-or-bed-then-per-interval-network-retry-once
